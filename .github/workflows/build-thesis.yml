name: Build thesis PDF

# Compila la tesis (doc/main.tex) a PDF.
# - Se puede lanzar a demanda desde la pestaña "Actions" (workflow_dispatch).
# - Tambien corre automaticamente cuando cambian los fuentes en doc/.
# El PDF queda disponible como artefacto de la corrida y, ademas, se publica
# en GitHub Pages para poder enlazarlo/embeberlo desde el README.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "doc/**"
      - ".github/workflows/build-thesis.yml"

permissions:
  contents: read
  pages: write
  id-token: write

# Evita corridas de Pages superpuestas.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compilar LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: doc
          # shell-escape es necesario para que epstopdf convierta las imagenes .eps
          latexmk_shell_escape: true

      - name: Preparar artefacto de Pages
        run: |
          mkdir -p public
          cp doc/main.pdf public/thesis.pdf
          cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="es">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Selección de técnicas de vectorización de discursos políticos</title>
            <style>
              html, body { margin: 0; height: 100%; background: #1b1b1b; }
              embed { width: 100%; height: 100%; border: 0; }
            </style>
          </head>
          <body>
            <embed src="./thesis.pdf" type="application/pdf">
          </body>
          </html>
          HTML

      - name: Subir PDF como artefacto de la corrida
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf
          path: doc/main.pdf

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
